name: Build Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build on Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build Python Backend
        run: |
          python -m pip install -r requirements.txt
          bash build_executable.sh

      - name: Copy Python Backend to Tauri Resources
        run: |
          mkdir -p src-tauri/resources
          cp -r dist/wan2p2-gui src-tauri/resources/
          ls -la src-tauri/resources/wan2p2-gui/

      - name: Install Tauri dependencies
        working-directory: src-tauri
        run: npm install

      - name: Build Tauri App
        working-directory: src-tauri
        run: npm run build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/appimage/Wan2.2 Video Generator_0.1.0_amd64.AppImage
            src-tauri/target/release/bundle/deb/Wan2.2 Video Generator_0.1.0_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  build-windows:
    runs-on: windows-latest
    name: Build on Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build Python Backend
        run: |
          python -m pip install -r requirements.txt
          .\build_executable.bat

      - name: Copy Python Backend to Tauri Resources
        run: |
          mkdir src-tauri\resources -Force
          Copy-Item -Path dist\wan2p2-gui -Destination src-tauri\resources\ -Recurse
          Get-ChildItem src-tauri\resources\wan2p2-gui\

      - name: Install Tauri dependencies
        working-directory: src-tauri
        run: npm install

      - name: Build Tauri App
        working-directory: src-tauri
        run: npm run build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/msi/Wan2.2 Video Generator_0.1.0_x64_en-US.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  build-macos:
    runs-on: macos-latest
    name: Build on macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build Python Backend
        run: |
          python -m pip install -r requirements.txt
          bash build_executable.sh

      - name: Copy Python Backend to Tauri Resources
        run: |
          mkdir -p src-tauri/resources
          cp -r dist/wan2p2-gui src-tauri/resources/
          ls -la src-tauri/resources/wan2p2-gui/

      - name: Install Tauri dependencies
        working-directory: src-tauri
        run: npm install

      - name: Build Tauri App
        working-directory: src-tauri
        run: npm run build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
