<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan2.2 Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .status.success {
            color: #4caf50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎥</div>
        <h1>Wan2.2 Video Generator</h1>
        <p class="subtitle">Desktop Application</p>
        
        <div class="spinner"></div>
        
        <div class="status" id="status">
            Launching backend server...
        </div>
        
        <div class="info">
            <strong>Starting up:</strong><br>
            • Initializing Python backend<br>
            • Connecting to Gradio UI<br>
            • Loading models and dependencies<br>
            <br>
            This may take 10-30 seconds on first launch.
        </div>
    </div>
    
    <script>
        // Check if backend is ready and redirect
        async function checkBackend() {
            const maxAttempts = 60; // 30 seconds with 500ms intervals
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                    const response = await fetch('http://localhost:7860/info', {
                        method: 'GET',
                        mode: 'no-cors',
                    });
                    
                    // If we get here, the backend is responding
                    document.getElementById('status').textContent = '✅ Backend ready! Redirecting...';
                    document.getElementById('status').classList.add('success');
                    
                    // Redirect to the Gradio UI
                    setTimeout(() => {
                        window.location.href = 'http://localhost:7860';
                    }, 500);
                    
                    return;
                } catch (error) {
                    // Backend not ready yet
                    const percentage = Math.round((attempt / maxAttempts) * 100);
                    document.getElementById('status').textContent = 
                        `Launching backend... ${percentage}%`;
                    
                    // Wait before retrying
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            
            // Timeout - backend didn't start
            document.getElementById('status').textContent = 
                '❌ Backend failed to start. Check the console for errors.';
            document.getElementById('status').classList.add('error');
        }
        
        // Start checking when page loads
        window.addEventListener('load', checkBackend);
    </script>
</body>
</html>
