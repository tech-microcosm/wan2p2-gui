<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan2.2 Video Generator - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Wan2.2 Video Generator</h1>
        <div class="spinner"></div>
        <p>Starting video generation backend...</p>
        <p class="status" id="status">Please wait...</p>
    </div>
    <script>
        console.log('[LOADING PAGE] Script started');
        
        // Prevent multiple redirects
        let hasRedirected = false;
        let attempts = 0;
        const maxAttempts = 120; // 2 minutes max
        
        function checkBackend() {
            if (hasRedirected) {
                console.log('[LOADING PAGE] Already redirected, skipping check');
                return;
            }
            
            attempts++;
            console.log(`[LOADING PAGE] Check attempt ${attempts}/${maxAttempts}`);
            document.getElementById('status').textContent = `Connecting... (attempt ${attempts})`;
            
            // Use image loading to check if server is up (works cross-origin)
            const img = new Image();
            const timeout = setTimeout(() => {
                console.log(`[LOADING PAGE] Attempt ${attempts} timed out`);
                img.src = ''; // Cancel request
                if (attempts < maxAttempts) {
                    setTimeout(checkBackend, 1000);
                } else {
                    console.error('[LOADING PAGE] Max attempts reached');
                    document.getElementById('status').textContent = 'Backend failed to start. Please restart the application.';
                }
            }, 800);
            
            img.onload = () => {
                clearTimeout(timeout);
                console.log('[LOADING PAGE] Backend responded! Redirecting...');
                hasRedirected = true;
                document.getElementById('status').textContent = 'Connected! Loading Gradio...';
                
                // Delay redirect slightly to ensure flag is set
                setTimeout(() => {
                    console.log('[LOADING PAGE] Executing redirect to http://localhost:7860/');
                    window.location.replace('http://localhost:7860/'); // Use replace to avoid back button issues
                }, 500);
            };
            
            img.onerror = () => {
                clearTimeout(timeout);
                console.log(`[LOADING PAGE] Attempt ${attempts} failed (server not ready)`);
                if (attempts < maxAttempts) {
                    setTimeout(checkBackend, 1000);
                } else {
                    console.error('[LOADING PAGE] Max attempts reached');
                    document.getElementById('status').textContent = 'Backend failed to start. Please restart the application.';
                }
            };
            
            // Try to load favicon or any static resource
            img.src = 'http://localhost:7860/favicon.ico?' + Date.now();
        }
        
        // Start checking after 2 seconds
        console.log('[LOADING PAGE] Will start checking backend in 2 seconds');
        setTimeout(checkBackend, 2000);
        
        // Log if page is being unloaded
        window.addEventListener('beforeunload', () => {
            console.log('[LOADING PAGE] Page unloading');
        });
    </script>
</body>
</html>
